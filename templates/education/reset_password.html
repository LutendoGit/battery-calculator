<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Password — Battery Education</title>
    {% include '_favicon.html' %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      .card {
        max-width: 560px;
        margin: 60px auto;
        border: none;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      }
      h1 { color: #667eea; font-weight: 700; }
      .small-help { color: #555; }

      .pw-toggle-btn {
        min-width: 38px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border: 0;
        padding: 0 10px;
        color: #6c757d;
        text-decoration: none;
        box-shadow: none;
      }

      .pw-toggle-btn:hover,
      .pw-toggle-btn:focus {
        color: #495057;
        text-decoration: none;
        box-shadow: none;
      }

      .pw-toggle-btn svg {
        width: 18px;
        height: 18px;
        display: block;
      }

      .password-input-container {
        position: relative;
      }

      .password-input-container .form-control {
        padding-right: 40px;
      }

      .password-input-container .pw-toggle-btn {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        min-width: auto;
        width: 20px;
        height: 20px;
        padding: 0;
        background: transparent;
        border: none;
        color: #6c757d;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .password-input-container .pw-toggle-btn:hover,
      .password-input-container .pw-toggle-btn:focus {
        color: #495057;
        background: transparent;
        outline: none;
      }

      .password-input-container .pw-toggle-btn svg {
        width: 16px;
        height: 16px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h1 class="h4 m-0">Choose a new password</h1>
          <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('education.login') }}">Back</a>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <p class="small-help mb-3">Your new password must be at least 6 characters.</p>

        <form method="post" action="{{ url_for('education.reset_password', token=token) }}">
          <div class="form-group">
            <label>New password</label>
            <div class="password-input-container">
              <input id="password" class="form-control" name="password" type="password" autocomplete="new-password" required>
              <button class="pw-toggle-btn" type="button" data-toggle-password="#password" aria-label="Show password" title="Show password"></button>
            </div>
          </div>
          <div class="form-group">
            <label>Confirm new password</label>
            <div class="password-input-container">
              <input id="confirm_password" class="form-control" name="confirm_password" type="password" autocomplete="new-password" required>
              <button class="pw-toggle-btn" type="button" data-toggle-password="#confirm_password" aria-label="Show password" title="Show password"></button>
            </div>
          </div>

          <button class="btn btn-primary" type="submit">Update password</button>
        </form>
      </div>
    </div>

    <script>
      (function () {
        var EYE = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">'
          + '<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'
          + '<path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'
          + '</svg>';

        var EYE_OFF = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">'
          + '<path d="M3 3l18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'
          + '<path d="M10.6 10.6a3 3 0 0 0 4.24 4.24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'
          + '<path d="M9.88 5.09A10.94 10.94 0 0 1 12 5c6.5 0 10 7 10 7a17.14 17.14 0 0 1-3.22 4.39" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'
          + '<path d="M6.11 6.11C3.86 7.73 2 10.5 2 12s3.5 7 10 7a10.94 10.94 0 0 0 4.91-1.12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'
          + '</svg>';

        function setButtonState(button, isHidden) {
          button.innerHTML = isHidden ? EYE : EYE_OFF;
          var label = isHidden ? 'Show password' : 'Hide password';
          button.setAttribute('aria-label', label);
          button.setAttribute('title', label);
        }

        document.querySelectorAll('[data-toggle-password]').forEach(function (button) {
          var selector = button.getAttribute('data-toggle-password');
          var input = selector ? document.querySelector(selector) : null;
          if (!input) return;

          setButtonState(button, input.type === 'password');
          button.addEventListener('click', function () {
            var isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            setButtonState(button, input.type === 'password');
            try { input.focus(); } catch (e) {}
          });
        });
      })();
    </script>
  </body>
</html>
